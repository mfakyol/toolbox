# Preserve the original scheme when we sit behind another proxy (host nginx
# terminating TLS). If it already sent X-Forwarded-Proto, keep it (https);
# otherwise fall back to our own scheme. This is what lets the backend know
# the request was HTTPS and issue Secure cookies.
map $http_x_forwarded_proto $fwd_proto {
  default $scheme;
  "~.+"   $http_x_forwarded_proto;
}

server {
  listen 80;
  server_name _;

  # Dosya transferi büyük olabilir (backend sınırı MAX_TRANSFER_SIZE, ~2GB).
  client_max_body_size 2048m;

  root /usr/share/nginx/html;
  index index.html;

  # Hash'li build asset'leri (Vite her build'de dosya adına içerik-hash'i ekler)
  # sonsuza kadar cache'lenebilir — içerik değişince dosya adı da değişir.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # index.html ASLA cache'lenmesin — yeni build anında görünsün (yeni hash'li
  # asset'lere işaret eder). Cache sorununun asıl çözümü budur.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }

  # SPA: bilinmeyen yolları index.html'e düşür (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API isteklerini backend servise yönlendir (compose ağı: "server").
  location /api/ {
    proxy_pass http://server:6000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;

    # Stream large uploads/downloads instead of buffering them.
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
